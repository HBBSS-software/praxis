<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Record - Social Practice Records</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Social Practice System</h2>
                <span class="role-badge student">Student</span>
            </div>

            <nav class="sidebar-nav">
                <a href="dashboard.html">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                    </svg>
                    My Records
                </a>
                <a href="upload.html" class="active">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    Upload Record
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="user-avatar">S</div>
                    <div class="user-details">
                        <div class="user-name" id="user-name">Loading...</div>
                        <div class="user-role">Student</div>
                    </div>
                </div>
                <button class="btn btn-secondary btn-sm" id="logout-button" type="button" style="width: 100%;">
                    Sign Out
                </button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1>Upload Social Practice Record</h1>
                <p>Fill in the details below and optionally attach a supporting image.</p>
            </div>

            <div class="card" style="max-width: 800px;">
                <div class="error-message" id="error-message"></div>
                <div
                    class="success-message"
                    id="success-message"
                    style="display: none; background: #d1fae5; color: #065f46; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px;"
                ></div>

                <form id="upload-form">
                    <div class="form-group">
                        <label for="title">Practice Title *</label>
                        <input type="text" id="title" name="title" placeholder="For example: Community volunteer service" required>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="form-group">
                            <label for="practice_date">Practice Date *</label>
                            <input type="date" id="practice_date" name="practice_date" required>
                        </div>

                        <div class="form-group">
                            <label for="duration">Duration (hours)</label>
                            <input type="number" id="duration" name="duration" placeholder="For example: 2.5" min="0.5" step="0.5">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="location">Location</label>
                        <input type="text" id="location" name="location" placeholder="For example: Community service center">
                    </div>

                    <div class="form-group">
                        <label for="content">Practice Summary *</label>
                        <textarea id="content" name="content" placeholder="Describe what you did, what you learned, and the outcome..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label>Practice Photo</label>
                        <div class="image-upload" id="image-upload" role="button" tabindex="0">
                            <input type="file" id="image-input" accept="image/*" style="display: none;">
                            <div id="upload-placeholder">
                                <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin-bottom: 12px; opacity: 0.5;">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                                </svg>
                                <p style="color: var(--gray-600);">Click to choose an image</p>
                                <p style="font-size: 12px; color: var(--gray-400); margin-top: 4px;">JPG, PNG, or GIF up to 5MB</p>
                            </div>
                            <img id="image-preview" style="display: none;" alt="Preview">
                        </div>
                    </div>

                    <div style="display: flex; gap: 12px; margin-top: 24px;">
                        <a href="dashboard.html" class="btn btn-secondary" style="flex: 1;">Cancel</a>
                        <button type="submit" class="btn btn-primary" id="submit-btn" style="flex: 1;">
                            Submit Record
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script type="module" src="../js/student/upload.js"></script>
</body>
</html>
